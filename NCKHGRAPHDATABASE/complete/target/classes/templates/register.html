<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register</title>

    <link th:href="@{/css/register.css}" rel="stylesheet">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="register-wrapper">
    <div class="register-container">

        <div class="logo">
            <i class="fas fa-user-plus fa-4x"></i>
        </div>

        <h2>Create Account</h2>

        <!-- ✅ FIX: chỉ hiển thị khi có message -->
        <p class="error-msg" th:if="${error != null}" th:text="${error}"></p>
        <p class="success-msg" th:if="${success != null}" th:text="${success}"></p>

        <form th:action="@{/register}" method="post" id="registerForm" autocomplete="off">

            <div class="input-group">
                <i class="fas fa-user"></i>
                <input name="username"
                       placeholder="Username"
                       required
                       minlength="2"
                       maxlength="50">
            </div>

            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email"
                       name="email"
                       placeholder="Email"
                       required>
            </div>

            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password"
                       name="password"
                       placeholder="Password"
                       required
                       minlength="6">
            </div>

            <!-- Customer đăng ký mặc định -->
            <input type="hidden" name="role" value="customer">

            <button type="submit">Register</button>
        </form>

        <div class="login-link">
            <span>Already have an account? </span>
            <a th:href="@{/login}">Login</a>
        </div>

    </div>
</div>

<script th:src="@{/js/register.js}"></script>
</body>
</html>
